<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect for custom domains (no subdirectory prefix)
    // Redirects /any/path to /?p=any%2Fpath so index.html can restore the route
    var l = window.location;
    var path = l.pathname.slice(1); // strip leading slash
    if (path) {
      l.replace(
        l.protocol + '//' + l.host + '/?p=' + encodeURIComponent(path + l.search) + (l.hash || '')
      );
    }
  </script>
</head>
<body></body>
</html>
