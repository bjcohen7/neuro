<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect trick
    // Preserve the full path (e.g. /report/TOKEN) and redirect to index.html with ?p= encoding
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) +
      (l.hash || '')
    );
  </script>
</head>
<body></body>
</html>
