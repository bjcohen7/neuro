<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MyNeuroTest</title>
  <script>
    // GitHub Pages SPA redirect: store the path and redirect to index
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/' +
      '?p=' + encodeURIComponent(l.pathname.slice(1)) +
      (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
